{% extends "base.html" %}
{% block content %}
<div class="auth-container animate-flow" style="max-width:520px;">
    <div style="text-align:center;margin-bottom:28px;">
        <div style="width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--crimson-dark),var(--crimson));display:inline-flex;align-items:center;justify-content:center;animation:heartbeat 1.5s infinite;box-shadow:0 0 40px rgba(220,20,60,0.3);">
            <i class="fas fa-user-plus" style="color:white;font-size:1.4rem;"></i>
        </div>
    </div>
    <div class="auth-card">
        <h2>Create Account</h2>
        <p class="subtitle">Join CardioSight for personalized health tracking</p>
        <form id="register-form">
            <div class="grid-2">
                <div class="form-group"><label>Full Name</label><input type="text" id="reg-name" class="form-control" placeholder="John Doe" required></div>
                <div class="form-group"><label>Date of Birth</label><input type="date" id="reg-dob" class="form-control" required></div>
            </div>
            <div class="form-group"><label>Phone Number</label><input type="tel" id="reg-phone" class="form-control" placeholder="+91 XXXXXXXXXX" required></div>
            <div class="form-group"><label>Email Address</label><input type="email" id="reg-email" class="form-control" placeholder="name@example.com" required></div>
            <div class="form-group"><label>Password</label><input type="password" id="reg-password" class="form-control" placeholder="Minimum 6 characters" minlength="6" required></div>
            <button type="submit" class="btn-primary" style="width:100%;justify-content:center;margin-top:8px;">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>
        <p style="text-align:center;margin-top:24px;font-size:0.88rem;color:var(--text-secondary);">
            Already registered? <a href="/login" style="color:var(--crimson);font-weight:700;text-decoration:none;">Sign In</a>
        </p>
        <div id="auth-message" style="margin-top:16px;text-align:center;font-size:0.86rem;"></div>
    </div>
</div>
{% endblock %}
