{% extends "base.html" %}

{% block content %}
<div class="glass-card animate-fade-in" style="max-width: 600px; margin: 40px auto;">
    <h2 style="text-align: center; color: var(--primary-color);">Create Account</h2>
    <p style="text-align: center; margin-bottom: 30px;">Join CardioSight for detailed health tracking.</p>

    <form id="register-form">
        <div class="grid-2">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" id="reg-dob" class="form-control" required>
            </div>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="reg-phone" class="form-control" placeholder="+91 XXXXXXXXXX" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="reg-email" class="form-control" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="reg-password" class="form-control" minlength="6" required>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">
            <i class="fas fa-user-plus"></i> Sign Up
        </button>
    </form>

    <p style="text-align: center; margin-top: 20px;">
        Already registered? <a href="/login" style="color: var(--secondary-color); font-weight: bold;">Login</a>
    </p>

    <div id="auth-message" style="margin-top: 15px; text-align: center; font-size: 0.9rem;"></div>
</div>
{% endblock %}
